<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balearic Beats IV — Scan to Visit</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      background: #000 url('bg-iv.jpg') center center / cover no-repeat;
      overflow: hidden;
    }

    /* Dark overlay so text pops over the photo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(0,0,0,0.72) 0%,
        rgba(10,5,30,0.55) 50%,
        rgba(0,0,0,0.72) 100%
      );
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 48px 56px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      box-shadow: 0 8px 80px rgba(0,0,0,0.6);
      text-align: center;
      max-width: 480px;
      width: 90vw;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    h1 {
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    h1 span {
      display: block;
      font-size: 0.55em;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
    }

    #qr-container {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 0 50px rgba(255,255,255,0.15);
    }

    #qr-container canvas,
    #qr-container img { display: block; }

    .cta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .dot {
      width: 9px;
      height: 9px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }

    .url {
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="eyebrow">Balearic Beats</p>

    <h1>
      The Festival
      <span>Mallorca · 11–14 March 2027</span>
    </h1>

    <div id="qr-container">
      <div id="qr"></div>
    </div>

    <p class="cta"><span class="dot"></span> Scan to visit the site</p>

    <p class="url">balearicbeats.es</p>
  </div>

  <script>
    new QRCode(document.getElementById("qr"), {
      text: "https://balearicbeats.es",
      width: 240,
      height: 240,
      colorDark: "#0a0510",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H,
    });
  </script>
</body>
</html>
